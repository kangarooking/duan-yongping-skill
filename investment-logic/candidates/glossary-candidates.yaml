# 段永平投资问答录-下（投资逻辑篇）— 关键概念词典
# 由 glossary-extractor 产出，供所有下游 skill 共享引用
# 生成时间: 2026-04-16

- id: gl-001
  term: 买股票就是买公司
  type: core-thesis
  source_chapter: "第1章 第1节 投资的信仰"
  source_quote: "我理解的投资归纳起来就是：买股票就是买公司，买公司就是买公司的未来现金流折现，句号！"
  author_definition: |
    买入股票等同于买入该企业的部分所有权，应以企业所有者视角思考一切投资行为。
    这不是比喻，而是字面意义上的"拥有"。段永平强调这是从"骨子里相信"的信仰级别认知，
    由此推导出所有后续投资逻辑。
  common_usage: |
    常识将股票视为可交易的筹码或凭证，关注价格波动和买卖时机。
    "买股票"在普通语境中指的是一种交易行为。
  difference: |
    段永平的用法是所有权思维，常识是交易思维。
    如果"买股票=买公司"，则关注点完全改变：不再关心股价短期涨跌，
    而是关心这家公司未来能赚多少钱、商业模式是否持久、管理层是否靠谱。
    这个定义是全书所有投资理念的公理起点。
  tags: [core-thesis, mindset, ownership]

- id: gl-002
  term: 做对的事情，把事情做对
  type: core-thesis
  source_chapter: "第1章 第3节 做对的事情"
  source_quote: "做对的事情其实就是发现是错的事情的时候要马上停止，不管多大的代价都是最小的代价。"
  author_definition: |
    这是两层意思的组合：
    "做对的事情" = 方向正确，核心是排除法——发现错了就停；
    "把事情做对" = 执行过程，是一个允许犯错的学习过程。
    段永平特别强调"做对的事情"靠的是"不做不对的事"来实现的。
  common_usage: |
    "做对的事"通常指主动选择正确方向；
    "把事做对"通常指执行到位。
    两者被视为并列的正面行为建议。
  difference: |
    段永平的关键反转："做对的事情"不是正面清单而是负面清单——核心是"停止做错的事"。
    这与 Stop Doing List 互为表里。
    投资中的"做对的事情"等于"不懂不做"，而"把事情做对"等于"搞懂生意"。
  tags: [core-thesis, methodology, stop-doing]

- id: gl-003
  term: Stop Doing List
  type: methodology
  source_chapter: "第1章 第4节 Stop Doing List"
  source_quote: "它不是一个skill（技巧）或者formula（公式），而是思维方式：如果发现错了，就立刻停止，因为这个时候成本是最小的。"
  author_definition: |
    一份"不做的事情"清单，是思维方式而非技巧或公式。
    包括：不做空、不用margin、不碰不懂的、不走捷径、不盲目扩能力圈、
    少决策、不短期投机、不碰高负债。
    好公司一定有长长的 Stop Doing List，这是企业文化的一部分。
  common_usage: |
    常识理解的"不做清单"是待办事项的反面，是一般的纪律约束。
    管理学中的"不做什么"通常是策略取舍的副产物。
  difference: |
    段永平将 Stop Doing List 提升到核心方法论高度——它比"做什么"更重要。
    它不是策略层面的取舍，而是信仰层面的底线。
    "没有捷径，要靠自己去积累、去攒、去体悟"——它不可教、不可复制，
    每个人必须自己建立。时间长了效果才明显。
  tags: [methodology, core-concept, stop-doing]

- id: gl-004
  term: 未来现金流折现
  type: concept
  source_chapter: "第1章 第1-2节；第5章 第1节"
  source_quote: "未来现金流折现只是一种思维方式，只有在能力圈范围内的公司，投资人才能毛估估看明白。没人真用公式的"
  author_definition: |
    思考公司未来整个生命周期（不是3年也不是5年）能产生的净现金流的折现值。
    关键：(1) 是思维方式，不是计算公式；(2) 折现率相对于投资人的机会成本；
    (3) 只在能力圈内才能"毛估估"；(4) 变量不可确定，套公式的人往往不靠谱。
  common_usage: |
    金融学中的 DCF（Discounted Cash Flow）是一个估值模型，
    通过预测未来现金流、选择折现率、代入公式计算企业内在价值。
    CFA 教材和投行训练中的标准工具。
  difference: |
    段永平明确否定 DCF 作为公式的用法："说自己有公式还有参数的都是不懂甚至可能是骗人的"。
    他强调的是定性判断而非定量计算——理解生意的质量和持续性，
    而非精确预测数字。"毛估估"是关键词，精准是精确的错误。
  tags: [concept, valuation, mindset]

- id: gl-005
  term: 生意模式（好生意）
  type: core-concept
  source_chapter: "第3章 第2节 好生意"
  source_quote: "好的商业模式的很简单，就是利润和净现金流一直都是杠杠的，而且竞争对手哪怕很长的时间里也很难抢。"
  author_definition: |
    好生意 = 利润和净现金流持续强劲 + 竞争对手长期难以抢夺。
    护城河是生意模式的一部分。好的生意模式是好的未来现金流的保障。
    需要看：护城河是否长期坚固（差异化持续性）、长期毛利率是否合理、
    长期净现金流是否满意。巴菲特提醒段永平"首先看生意模式"。
  common_usage: |
    "好生意"通常指"赚钱的公司"或"行业前景好"。
    商业讨论中的"生意模式"泛指盈利方式。
  difference: |
    段永平的"好生意"核心是"竞争壁垒的持久性"而非"当下赚钱"。
    不是看现在利润高，而是看对手"很长时间里也很难抢"。
    "首先看生意模式"是他从巴菲特学到的最重要的一课，
    排在企业文化、管理团队、价格之前。
  tags: [core-concept, analysis, moat]

- id: gl-006
  term: 能力圈
  type: core-concept
  source_chapter: "第3章 第3节 能力圈"
  source_quote: "能力圈的意思就是你能够判断未来现金流折现的范围。知道自己的能力圈有多大比能力圈本身有多大要重要的多。"
  author_definition: |
    能力圈 = 你能判断未来现金流折现的范围。
    关键不在圈有多大，而在于"知道自己知道什么和不知道什么"。
    "能力圈是：诚实对自己，知之为知之，不知为不知"。
    不要轻易扩大能力圈，搞懂一个生意需要很多年。
  common_usage: |
    "能力圈"通常理解为"熟悉的领域"或"专业范围"。
    一般人认为从事某行业就算在该行业的能力圈内。
  difference: |
    段永平（及巴菲特）的能力圈定义极其严格：
    熟悉不等于在能力圈内——必须能判断5-10年前景才算。
    博士学位、从业多年也不代表在能力圈内。
    "知道自己的能力圈有多大"比"能力圈大"更重要——
    这是一种自知之明，不是知识广度。
  tags: [core-concept, boundary, self-awareness]

- id: gl-007
  term: 平常心
  type: mindset
  source_chapter: "第6章 第4节 投资心态（平常心）"
  source_quote: "平常心简单讲就是回到事物的本源，知道什么是事物的本源不是件容易的事。比如投资，买的就是公司未来的净现金流，别的都是没关系的。"
  author_definition: |
    平常心 = 回到事物的本源思考，不被恐惧和贪婪驱动。
    在投资中，本源就是"公司未来的净现金流"，其他都是噪音。
    段永平认为平常心与芒格说的"理性"是同一个东西，
    但他选择"平常心"这个表述更贴近东方哲学。
  common_usage: |
    "平常心"在日常语境中通常指"淡定"、"不激动"、"心态好"，
    是一种情绪稳定的心理状态，偏向"佛系"和被动接受。
  difference: |
    段永平的平常心不是"不激动"，而是"回到本源"——
    它需要深厚的理解力，知道什么是本源本身就是最困难的事。
    它是主动的认知行为（回归本质），不是被动的情绪管理（压抑情绪）。
    "搞不清公司未来现金流的前提下的投资多数情况下会变成投机"——
    平常心的前提是真正理解，不是靠意志力压制波动。
  tags: [mindset, emotional-management, core-concept]

- id: gl-008
  term: 机会成本
  type: concept
  source_chapter: "第5章 第6节 机会成本"
  source_quote: "折现率实际上是相对于投资人的机会成本而言的。最低的机会成本就是无风险回报率。"
  author_definition: |
    机会成本是所有买卖决策的核心标准：
    (1) 折现率本质上就是投资人的机会成本；
    (2) 每天的收盘价就是持仓的机会成本——"没有卖就等于买了"；
    (3) 持有错误公司的机会成本远大于账面亏损；
    (4) 所有投资决策都应与"最好的替代选项"比较。
  common_usage: |
    经济学中的机会成本指"为了得到某种东西而放弃的其他选择中最大的那个价值"。
    在日常投资讨论中通常只用来比较两个投资标的的预期收益。
  difference: |
    段永平将机会成本从比较工具提升为决策核心：
    "没有卖就等于买了"——每一天你持有的股票，都等于你用当天的市价重新买入了一次。
    这意味着持仓本身就是持续的决策，而非一次性的。
    买入成本已经沉没，不应影响决策；真正要比较的是当前所有可选标的中最好的那个。
  tags: [concept, decision-making, valuation]

- id: gl-009
  term: 安全边际
  type: concept
  source_chapter: "第3章 第4节；第7章 案例分析"
  source_quote: "我认为老巴的安全边际实际上指的是理解度而不是价格。从10年的角度看，买的时候比最低价贵30%其实没多少。"
  author_definition: |
    安全边际 = 投资人对要投资的生意的了解程度。
    了解越深，风险越小，可投入比例越大。
    不仅仅是价格上的折扣，更重要的是对生意本质的把握。
    "总的来讲，我感觉中的安全边际指的不仅仅是价格。"
  common_usage: |
    格雷厄姆和传统价值投资中的安全边际 = 内在价值与买入价格之间的差距。
    即以显著低于内在价值的价格买入，价格折扣就是安全边际。
  difference: |
    段永平对安全边际做了根本性重新定义：不是价格差，而是"理解度"。
    好的生意模式本身就是安全边际——"生意模式和确定性高也是另一方面的安全边际"。
    这意味着对好公司，价格上的安全边际可以留小些；
    而对不理解的公司，即使价格折扣大也没有安全边际。
  tags: [concept, valuation, redefined]

- id: gl-010
  term: 简单但绝不容易
  type: insight
  source_chapter: "第2章 第3节 投资是否难"
  source_quote: "投资很简单但绝不容易。简单指的是原则-就是不懂不做，不容易指的是理解搞懂生意不容易。"
  author_definition: |
    投资的原则极其简单（不懂不做），但执行极其困难（搞懂生意需要多年积累）。
    这是段永平对投资难度的二元定义：原则层面简单，执行层面困难。
    "要能搞懂企业就算看一吨的书也不一定行"。
  common_usage: |
    "简单但不容易"在日常生活中通常指"道理简单但做起来难"。
    没有特定的投资含义，是一种一般性的感叹。
  difference: |
    段永平将其提炼为投资的核心矛盾：
    原则简单 = 只有三个字"不懂不做"；
    执行困难 = 搞懂一个生意可能需要20年。
    这解释了为什么大多数人知道价值投资却做不到——
    不是原则不清楚，而是真正搞懂生意极其困难。
  tags: [insight, mindset, paradox]

- id: gl-011
  term: 定性分析
  type: methodology
  source_chapter: "第2章 第5节 封仓十年的选择"
  source_quote: "我觉得所谓未来现金流的定性分析比定量分析要重要的多，用公式的人往往会陷于细节而忽略整体。"
  author_definition: |
    定性分析 = 关注生意的本质特征（护城河、差异化持续性、企业文化），
    而非可量化的数字。"模糊的正确胜过精确的错误"。
    从10年以上的角度看，定量分析很荒唐。
    段永平自称"在投资里用定性分析确实比较多，这也是我和华尔街分析家们的区别"。
  common_usage: |
    金融分析中，定性分析通常指非数值化的分析（如行业趋势、管理团队评估），
    与定量分析（财务比率、统计模型）互补使用，两者被认为是并重的。
  difference: |
    段永平不将定性定量视为互补，而是有明确优先级：定性远比定量重要。
    "用公式的人往往会陷于细节而忽略整体"——
    定量分析可能是危险的，因为它给人一种精确的错觉。
    定性分析不是定量的补充，而是核心；定量只是验证工具。
  tags: [methodology, analysis, priority]

- id: gl-012
  term: 封仓十年
  type: methodology
  source_chapter: "第2章 第5节 封仓十年的选择"
  source_quote: "封仓10年是个很好的思路，选股时就该这么想。"
  author_definition: |
    封仓十年 = 买入股票时假设未来10年不能交易，以这个前提来评估公司。
    这是一种思维测试，不是真正的锁仓操作。
    "不打算拿10年的股票一天也不要持有"。
    但段永平也承认"我买股票时还真没有想过要拿多少年"——
    关键是选股时的思维框架，而非机械持有期限。
  common_usage: |
    "长期持有"通常指持有一只股票数年，时间长度因人而异（1年、3年、5年都算长线）。
    "封仓"在字面意思是封闭仓位不允许交易。
  difference: |
    段永平的封仓十年不是操作指令而是选股过滤器——
    它的目的是在买入前就做充分的定性判断。
    "其实看几年并不是个时间长短的问题，而是个定性的问题"——
    不是真的要拿10年，而是用10年视角来评估生意的确定性。
  tags: [methodology, time-horizon, selection]

- id: gl-013
  term: E/E（Enterprise Value / Earnings）
  type: metric
  source_chapter: "第5章 第4节 对市盈率的看法"
  source_quote: "相对于pe，我会更多用e/e来衡量一个企业。这里有一个e是enterprise value。"
  author_definition: |
    E/E = Enterprise Value（企业价值）÷ Earnings（利润）。
    企业价值 = 市值 + 负债 - 现金。
    段永平偏好 E/E 而非 PE，因为"用enterprise value最大的好处是让投资者注意负债的影响"。
    PE 忽略了资本结构的差异，两家 PE 相同的公司可能负债天差地别。
  common_usage: |
    EV/Earnings 或 EV/EBITDA 是投行和机构投资者常用的估值指标。
    普通投资者更熟悉 PE（市盈率），E/E 在散户中使用较少。
  difference: |
    段永平不是在机构分析框架下使用 E/E，而是作为"比 PE 更合理的估值直觉"。
    他强调的是 E/E 强制你关注负债——"能反映负债"。
    这与他一贯的思维一致：关注企业的完整财务结构，
    而非只看股权端的市盈率。
  tags: [metric, valuation, alternative]

- id: gl-014
  term: 守正不出奇
  type: mindset
  source_chapter: "第2章 第5节 封仓十年的选择"
  source_quote: "其实我说的不出奇并不是说结果不出奇，而是说心里不要老想着出奇。你如果老想着本质的东西，总有机会出奇的。"
  author_definition: |
    守正不出奇 = 专注于本质（守正），不去刻意追求意外之喜（出奇）。
    段永平特意将成语"守正出奇"改为"守正不出奇"——
    不是说结果不会出奇（长期好结果几乎是必然），而是心里不要老想着出奇。
    "投资做对了的话，其实很难不出奇的，也许3年两年，也许10年8年而已。"
  common_usage: |
    "守正出奇"是《孙子兵法》中的经典战略思想：以正合、以奇胜。
    意为以正规方式对阵，以出其不意取胜。
    在商业和投资语境中通常鼓励创新和差异化策略。
  difference: |
    段永平反转了孙子兵法的智慧——投资不需要"出奇"，
    "整天想着出奇犯错机会会下降"改成"不整天想着出奇犯错机会会下降"。
    好结果（出奇）是守正的自然结果，不是刻意追求的目标。
    一个网友因此将网名从"守正出奇"改为"守正不出奇"，
    段永平评价"多了这个'不'字，少了很多困扰"。
  tags: [mindset, philosophy, redefined]

- id: gl-015
  term: 充要条件
  type: insight
  source_chapter: "第3章 第3节 谈能力圈与原则"
  source_quote: "投资里没有充要条件，就是没有数学公式可以用的意思，所以不存在投资的充要条件是什么的问题。"
  author_definition: |
    投资中不存在充分条件——即使"好的生意模式+好的企业文化+好的管理团队+好价钱"
    也只是提高概率而非保证成功。
    投资里甚至必要条件都很难找到。
    "投资里最难的地方就是找不到可以投的'充分条件'，如果有的话，那电脑就可以比人脑厉害了。"
    只能从概率角度考虑，越了解的公司决策把握越大，但从来没有100%的赢面。
  common_usage: |
    数学/逻辑中的充要条件（sufficient and necessary condition）：
    A是B的充要条件意味着A成立当且仅当B成立。
    在日常讨论中通常用于分析因果关系的完备性。
  difference: |
    段永平用"没有充要条件"来定义投资的本质困难——
    投资不是数学问题，没有确定性公式。
    "好的生意模式+好的企业文化+好的管理团队+好价钱"看似是完美组合，
    但这样的公司也可能犯致命错误，只是概率更低、恢复力更强。
    这意味着投资永远只能做概率判断，不能追求确定性。
