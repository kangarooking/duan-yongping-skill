- id: cs-001
  title: "网易投资（100倍回报）"
  type: case
  source_chapter: "第七章 案例2：网易"
  source_quote: "我们能在网易上赚到100多倍是因为我在做小霸王时就有了很多对游戏的理解，这种理解学校是不会教的，书上也没有，财报里也看不出来。"
  summary: |
    2002年前后，网易因互联网泡沫破裂跌至0.8-1美元左右（面临摘牌风险）。
    段永平基于多年游戏行业经验（小霸王游戏机），判断网易的游戏业务（大话西游、梦幻西游）
    市场极大，而市场普遍不看好游戏行业。他从0.8-1美元开始大量买入，过程中非常孤独，
    每天买单有一半是他下的。最终持有到120-140美元才卖出，获得约100倍回报。
    段永平自己也说"这辈子可能不会再遇到"这样的机会。
  bind_to: ["fw-001", "pr-002"]  # 能力圈决策框架 + 好生意识别法
  outcome: "约100倍回报，是段永平投资生涯中最经典的案例。他自己承认这是可遇不可求的机会。"
  tags: [case, investment, 100x, game-industry, circle-of-competence]

- id: cs-002
  title: "贵州茅台投资（长期重仓）"
  type: case
  source_chapter: "第七章 案例1：贵州茅台"
  source_quote: "茅台这个生意和我们的消费电子比较起来，最大的差别可能就在库存上。我们这个行业的库存几乎就是垃圾，茅台几乎就是个宝。"
  summary: |
    段永平从2012-2013年左右开始大规模买入茅台（A股），核心逻辑：
    1) 商业模式极好——库存越久越值钱、供不应求、有定价权、无需售后服务；
    2) 品质文化深厚——"四服从原则"（产量/速度/成本/效益服从质量）、"不挖老窖不卖新酒"；
    3) 产能受地理限制形成天然壁垒。
    在塑化剂事件和反腐风暴期间，市场恐慌抛售，他委托朋友在美国送检茅台，
    确认没有问题后大规模买入。期间他曾表示"我也在调集资金买茅台"。
    从10年以上视角看，他认为茅台年利润会大幅增长。实际到2019年茅台利润已远超200亿。
  bind_to: ["fw-001", "pr-003", "pr-005"]  # 能力圈 + 好生意识别 + 机会成本
  outcome: "长期持有至今，茅台成为段永平A股最大重仓，回报丰厚。"
  tags: [case, investment, maotai, pricing-power, business-model, long-term]

- id: cs-003
  title: "苹果投资（重仓美股）"
  type: case
  source_chapter: "第七章 案例3：苹果"
  source_quote: "我在2011年买苹果的时候，苹果大概3000亿市值，手里有1000亿净现金，那时候利润大概不到200亿。以我对苹果的理解，我认为苹果未来5年左右盈利大概率会涨很多，所以我就猜个500亿。"
  summary: |
    2011年起，段永平开始买入苹果（约44美元/股，经拆股调整前约310美元）。
    他对苹果的理解来源于20多年消费电子行业经验（小霸王、步步高、OPPO），
    认为：1) 苹果的生意模式是他"一直梦寐以求但似乎难以达到的生意模式"——
    单品模式、极高毛利、生态护城河；2) OPPO和苹果有相同基因，这是他能看懂苹果的原因之一；
    3) 用户体验极致——他亲自使用iPhone、iPad后"确实很服气"。
    他认为苹果当时是"低PE同时高增长"的公司。买入后苹果成为其美股最大持仓。
  bind_to: ["fw-001", "pr-003", "pr-004"]  # 能力圈 + 好生意识别 + 企业所有者视角
  outcome: "苹果股价从约44美元（拆股调整后）涨至200美元以上（2019年），段永平长期持有。"
  tags: [case, investment, apple, ecosystem, consumer-electronics, business-model]

- id: cs-004
  title: "做空百度（巨额亏损的反面案例）"
  type: case
  source_chapter: "第一章 第4节 Stop doing list"
  source_quote: "有一次属于极度愚蠢，就是跑去short百度。之前投资表现非常好，有点飘飘然，真以为自己很厉害。所有账号加起来亏了很多钱，大概有1.5-2亿美金。"
  summary: |
    段永平在做空百度上亏损约1.5-2亿美元。原因是他之前投资表现很好，
    "有点飘飘然，真以为自己很厉害"，加上"失去平常心的愚蠢行为"。
    虽然确实看到了百度的一些问题（百度后来也因此大跌），但做空本身是错误的行为。
    这次错误把他的现金储备全部消耗掉，机会成本巨大——否则金融危机时可以赚更多。
    最遗憾的是这发生在巴菲特叫他不要做空之后。
  bind_to: ["fw-002"]  # Stop Doing List 投资纪律
  outcome: "亏损1.5-2亿美金，现金储备耗尽，错失金融危机中的大量机会。成为他投资生涯最重要的反面教训。"
  tags: [case, investment, short-selling, loss, lesson, baidu]

- id: cs-005
  title: "GE（通用电气）投资"
  type: case
  source_chapter: "第五章 估值逻辑 / 第一章 第4节"
  source_quote: "当GE掉到10块钱以下时，我想GE好的时候能赚差不多两块钱，只要经济恢复正常，他怎么还不赚个一块多？由于GE的rating长期来讲还是会非常高的，假设他能赚1.5，给他个15倍PE不就20多了吗？"
  summary: |
    2008-2009年金融危机期间，GE股价跌破10美元（最低破6美元）。
    段永平敢于重手买入，原因是：1) 作为企业经营者，跟踪GE的企业文化很多年，
    从心底认为GE是家伟大的公司；2) 简单的估值逻辑——GE好的时候能赚约2美元/股，
    恢复后赚1.5美元，给15倍PE就是20多美元。
    他承认GE负债率高是他投资中的例外（一般不买负债高的公司）。
    这次投资也属于他"平均两年出手一次"的节奏，在网易之后、苹果之前。
  bind_to: ["fw-001", "pr-004", "pr-005"]  # 能力圈 + 企业所有者视角 + 机会成本
  outcome: "GE最终恢复到20美元以上，验证了段永平对GE作为好公司犯错后能回来的判断。"
  tags: [case, investment, GE, financial-crisis, valuation, contrarian]

- id: cs-006
  title: "航空股FRNT投资失败"
  type: case
  source_chapter: "第一章 第4节 不做不懂的东西"
  source_quote: "我买过一只航空股，叫FRNT，亏了很多钱。当时买这家公司时，主要是觉得石油太贵了，一定会掉下来。石油一掉，航空公司最先受益。结果都对，油也确实掉下来了，这家公司也确实后来赚了很多钱，但我们却亏掉了。"
  summary: |
    段永平买入了一家叫FRNT的小航空公司。逻辑是：石油太贵一定会跌，航空公司最先受益。
    判断虽然对了（油价确实跌了，公司也赚了钱），但公司因4家小航空公司突然破产，
    信用卡公司要求全额现金，CEO突然宣布进入破产法庭，投资者血本无归。
    这是一次典型的"做了自己其实不明白的事"——巴菲特之前已提醒过小心航空公司，
    但段永平当时没真正想通。
  bind_to: ["fw-002", "fw-001"]  # Stop Doing List + 能力圈
  outcome: "亏了很多钱。FRNT最终破产，投资者损失惨重。成为'不做不懂的东西'的典型案例。"
  tags: [case, investment, airline, loss, lesson, circle-of-competence]

- id: cs-007
  title: "UNG天然气ETF投资失误"
  type: case
  source_chapter: "第一章 第4节 不做不懂的东西"
  source_quote: "去年买过一只ETF，叫UNG，是和天然气挂钩的指数。我买的时候天然气的价格只有3块左右，而天然气的长期成本要大约6块以上。后来经过认真研究，发现UNG并不能和天然气线性相关，而且时间损耗还很大。"
  summary: |
    段永平买入UNG（天然气挂钩ETF），逻辑是天然气价格远低于长期成本，
    "没什么东西价格可以长期在成本价以下"。但后来发现UNG并不与天然气线性相关，
    且有时间损耗，属于对投资标的了解不够就下手了。想起"知错就改"的原则后，
    亏钱卖掉了。如果不卖，到后来要多亏约4倍。天然气价格后来比买入时高了50%，
    但UNG持有人依然亏损。
  bind_to: ["fw-002"]  # Stop Doing List
  outcome: "亏了超过xx万（段永平管的所有账号合计），但及时止损避免了4倍以上的更大损失。"
  tags: [case, investment, ETF, natural-gas, loss, lesson, stop-loss]

- id: cs-008
  title: "茅台送检塑化剂事件（验证型案例）"
  type: case
  source_chapter: "第七章 案例1：贵州茅台"
  source_quote: "确实是我委托朋友去送检的。个人观点一直认为茅台不可能故意加塑化剂，这次的检验结果也从侧面间接证明了这一点。看了这次检验结果后想多买点倒是真的。"
  summary: |
    2012年底白酒行业爆发塑化剂事件，茅台被推上风头浪尖。段永平委托朋友在美国
    对从美国市场购买的53度飞天茅台和30年茅台进行检测，结果证明茅台没有问题。
    他基于：1) 30年茅台的检测结果最能说明问题（最有动机加都没加）；
    2) 茅台的品质文化不会做这种事。确认无误后加大买入力度。
    这体现了他的投资方法论：通过独立验证事实来做决策，而非随市场恐慌行动。
  bind_to: ["pr-003", "pr-004"]  # 好生意识别 + 企业所有者视角
  outcome: "检测证明茅台无问题，塑化剂风波后茅台股价最终大幅回升，验证了独立判断的价值。"
  tags: [case, investment, maotai, due-diligence, plasticizer, verification]

- id: cs-009
  title: "创维数字投资（低估买入）"
  type: case
  source_chapter: "第三章 第2节 看懂一个公司"
  source_quote: "我们买创维时创维的市值只有十多个亿港币，他们那栋大楼都快有那个价了。创维在电视机行业里算是最健康的企业了，不太会乱来。"
  summary: |
    段永平买入创维数字时，创维市值仅十多亿港币，甚至不及公司大楼的价值。
    核心逻辑：1) 极度低估——市值低于净资产（那栋大楼的价值）；
    2) 创维是电视行业中最健康的企业，不太会乱来；
    3) 如果连创维都无法生存，这个行业就不复存在了。
    这是典型的"好公司遇到短期困难"的买入机会。
  bind_to: ["fw-001", "pr-004"]  # 能力圈 + 企业所有者视角
  outcome: "创维后来股价回升，验证了低估买入策略。"
  tags: [case, investment, skyworth, undervalued, net-asset-value]

- id: cs-010
  title: "公司闲钱投资转茅台（纠错案例）"
  type: case
  source_chapter: "第一章 第3节 做对的事情"
  source_quote: "大概五六年前我们公司让我负责一笔人民币闲钱的投资，开始我们买的时候可能了解不够，没能完全看明白，后来觉得是买错了，最后亏了点小钱卖掉了，全部换成了茅台。"
  summary: |
    段永平负责公司一笔人民币闲钱投资时，初始买入了解不够、没能完全看明白的标的，
    后来发现买错了。运用"发现错了马上改，不管多大的代价都是最小的代价"原则，
    亏了点小钱卖掉，全部换成茅台。如果当时不及时改正，到后来可能还亏着钱。
    体现了"沉没成本"和"机会成本"概念在投资决策中的应用。
  bind_to: ["fw-002", "pr-005"]  # Stop Doing List + 机会成本
  outcome: "及时纠错后换成茅台，避免了更大损失并获得良好回报。"
  tags: [case, investment, correction, maotai, opportunity-cost, sunk-cost]
