# 框架候选列表 — 段永平投资问答录-下（投资逻辑篇）
# 由 framework-extractor 提取，阶段 1 产出

- id: f01
  title: 做对的事情与把事情做对（两层框架）
  type: framework
  source_chapter: 第一章 第3节
  source_quote: |
    "做对的事情，把事情做对。发现错了马上改，不管多大的代价都是最小的代价。"
  summary: |
    段永平将一切行为（投资、经营、人生）拆成两层：第一层是"做对的事情"——方向选择，
    第二层是"把事情做对"——执行质量。方向错误时，执行力越强损失越大。
    因此"做对的事情"优先级高于"把事情做对"。
    当发现方向错误，立即纠错，无论代价多小都是当时最小的代价。
    这个框架是 Stop Doing List 的元逻辑——从"做对的事情"可以推导出所有"不该做的事"。
    它同样适用于企业经营：方向（战略）对了，执行（管理）才有意义。
    在投资中，先确认自己"做对的事情"（价值投资），再优化"把事情做对"（估值、分析）。
  tags: [decision, mental-model, priority, meta-framework]

- id: f02
  title: Stop Doing List（不为清单/排除法）
  type: framework
  source_chapter: 第一章 第4节 / 第七章 苹果案例
  source_quote: |
    "	stop doing list	。我觉得这是对'做对的事情'就是不
    做不对的事情，发现错了就改的最好的例子。"
  summary: |
    面对投资决策时，不先问"该做什么"，而是先明确"绝对不做什么"。
    段永平的不为清单包括：不做空、不用 margin、不做不懂的、不走捷径、
    不扩大能力圈、少决策、不短期投机、不碰高负债公司。排除法比正面策略
    更有效，因为"不做什么"的判断通常比"做什么"更清晰。这是从"做对的事情"
    推导出的可操作纪律。
  tags: [decision, checklist, exclusion, discipline]

- id: f03
  title: 买股票就是买公司（企业所有者视角）
  type: framework
  source_chapter: 第二章 第1节 / 第五章 第1节
  source_quote: |
    "买股票就是买公司，买公司就是买其未来现金流（的折现）。"
  summary: |
    将买入股票等同于买入该企业的部分所有权，以企业所有者视角审视一切。
    由此推导出：关注企业长期盈利能力而非股价波动；用非上市公司的思维理解
    投资——把公司抽象为只有一个股东来思考。
    "其实只要把公司想象成非上市公司，而且只有一个股东，大概就能容易明白了。"
    "其实任何股票都只有一个真正的买家，那就是公司自己。"
    这个视角转换是整个投资体系的公理性前提，所有后续方法论都由此推导。
    它消除了"股价思维"，让人专注于企业本身创造价值的能力。
  tags: [mental-model, perspective-shift, ownership, first-principle]

- id: f04
  title: 能力圈决策框架
  type: framework
  source_chapter: 第三章 第3节
  source_quote: |
    "能力圈就是你能看懂的公司范围，看懂的意思是能判断其未来5-10年的
    盈利能力。"
  summary: |
    能力圈是投资者真正理解其商业模式和未来盈利能力的公司范围。
    核心判断标准不是"熟悉的行业"，而是"能判断5-10年前景"。
    能力圈边界是模糊的，"知道自己不知道"比"知道自己知道"更重要。
    不要试图扩大能力圈，而是在圈内下注。
    当无法判断"懂不懂"时，默认为不懂，不碰。
    能力圈的大小因人而异，取决于个人经验和商业洞察力。
    "读书多能帮助你知道自己的能力圈有多大，不能帮助你扩大能力圈。"
  tags: [decision, boundary, self-awareness, circle-of-competence]

- id: f05
  title: 未来现金流折现思维方式
  type: framework
  source_chapter: 第五章 第1节 / 第2节
  source_quote: |
    "再次强调：未来现金流折现指的是一种思维方式，想用公式的请到学校
    去用哈。"
  summary: |
    DCF 在段永平体系中不是 Excel 计算模型，而是一种认知框架：评估任何投资
    时，思考公司未来能产生多少现金，再考虑时间价值（折现）。这个思维方式
    统一了所有投资决策——买什么、卖什么、持有多久、给多少估值。
    它是排除价值陷阱、判断便宜/贵、理解"持有=买入"的底层逻辑。
    "我就一个判断标准：未来现金流折现。看不懂的就不碰。"
  tags: [valuation, mental-model, thinking-tool, DCF]

- id: f06
  title: 封仓十年思路
  type: framework
  source_chapter: 第二章 第5节
  source_quote: |
    "封仓10年是个很好的思路，选股时就该这么想。"
  summary: |
    在评估是否买入某只股票时，假设买入后必须持有10年不能卖出，以此为前提
    来检验自己对公司的理解深度和信心。
    这个思维实验迫使投资者关注长期确定性而非短期波动，
    关注商业模式而非股价走势。
    "如果你觉得看10年比看三年难，那一定会觉得看三年会比看三天难。"
    时间越长，好公司的确定性越高。知道"什么会发生"比"什么时候发生"容易得多。
    给一个事情10年时间，大概率就会发生了；三年则未必。
    封仓十年不是真的要锁仓，而是以此标准筛选公司。
  tags: [decision, time-horizon, thought-experiment, long-term]

- id: f07
  title: 机会成本决策框架
  type: framework
  source_chapter: 第五章 第6节 / 第七章 茅台案例
  source_quote: |
    "比较有假设有两个东西可以买，A和B，该买哪个？买你更有把握的那个。
    这就是机会成本的概念。"
  summary: |
    所有买卖决策的统一标准是机会成本：每个选择都应与"目前最好的替代选项"
    比较。买入时，与持有现金或已有持仓的预期回报比较；卖出时，与继续持有
    的预期回报比较。卖股票不该与买入成本挂钩，该与价值挂钩。是否便宜
    取决于自己的机会成本（能力圈），而非市场定价。"你愿意给多少pe完全
    取决于你自己的能力或者说你自己的资金的机会成本。"
  tags: [decision, opportunity-cost, buy-sell-logic, unified-standard]

- id: f08
  title: 定性优先于定量（商业模式优先）
  type: framework
  source_chapter: 第三章 第2节 / 第四章
  source_quote: |
    "投资最重要的还是要看生意模式，不然的话大家就很容易只见树木
    不见森林。"
  summary: |
    投资分析中，定性判断（商业模式好不好、企业文化强不强、竞争壁垒高不高）
    优先于定量分析（PE 多少、ROE 多高、现金多少）。财务数据用来验证商业
    判断，而非替代商业理解。"我就觉得只要彩电市场还有的话，创维就死不了"
    就是定性判断的典型——先判断生意本质，再用数字验证。"往往非数字的东西
    比眼前数字的东西重要。"
  tags: [analysis, priority, qualitative-first, business-model]

- id: f09
  title: 平常心投资情绪管理
  type: framework
  source_chapter: 第六章 第4节
  source_quote: |
    "如果你关注的只是事物的本质，平常心自然就在那里了。"
  summary: |
    平常心不是"淡定"或"不在意"，而是基于对投资标的的深度理解而自然产生
    的理性状态。下跌时不恐慌（因为理解价值），上涨时不贪婪（因为关注
    长期现金流而非短期涨幅）。平常心的获得路径：1）用闲钱投资，避免
    生存压力；2）深入理解公司，消除不确定性带来的焦虑；3）不从众比较，
    不设短期目标。"在错的道路上是没办法有平常心的。"
  tags: [emotion-management, rationality, mindset, discipline]

- id: f10
  title: Right Business + Right People + Right Price + Time
  type: framework
  source_chapter: 第七章 茅台案例 / 苹果案例
  source_quote: |
    "right business + right people + right price + time = good result。
    虽然这个不是投资的充分公式，但好结果却是个比较大概率的事件。"
  summary: |
    段永平的四要素投资决策框架：好生意（right business）指具有持久竞争优势
    的商业模式；好人（right people）指有利润之上追求的企业文化和管理层；
    好价格（right price）指用未来现金流折现视角看合理或便宜；时间（time）
    是让价值实现的必要条件。四者齐备时，好结果是大概率事件。其中生意模式
    建立在企业文化之上，价格由机会成本决定。
  tags: [decision, framework, four-factors, holistic]

- id: f11
  title: 毛估估估值法
  type: framework
  source_chapter: 第五章 第2节 / 第七章 苹果案例/网易案例
  source_quote: |
    "好像巴菲特讲过：有一个300斤的胖子走进来，我不用秤就知道他很胖。
    我买网易时可真没认真'估值'过。"
  summary: |
    估值不需要精确计算，而是通过商业理解形成"大致值多少钱"的判断。
    方法是：先判断未来大致能赚多少钱（定性为主），再与当前市值对比，
    一眼就能看出胖瘦。关键不在于精确到小数点后两位，而在于判断方向
    是否正确。"有一个300斤的胖子走进来，我不用秤就知道他很胖"——
    当理解足够深时，估值变成常识判断而非数学题。
  tags: [valuation, heuristic, rough-estimate, qualitative]

- id: f12
  title: 安全边际=理解度
  type: framework
  source_chapter: 第三章 / 第七章 苹果案例
  source_quote: |
    "我自己对安全边际的理解实际上是自己对要投资的生意的了解度。
    自己觉得风险越小的投入的比例就可以越大些。"
  summary: |
    安全边际不仅仅是价格折扣，更核心的是对生意的理解深度。
    理解越深，确定性越高，实际风险越小，可以配置的仓位越大。
    例如段永平对苹果的理解使其愿意配置 90%+，
    但如果乔布斯健康状况不确定则只配 30%。
    仓位大小反映理解度而非价格便宜程度。
    不理解的公司，再便宜也没有安全边际。
    "我其实不完全明白老巴安全边际的意思。我自己对安全边际的理解实际上
    是自己对要投资的生意的了解度。"
  tags: [risk, position-sizing, understanding, margin-of-safety]

- id: f13
  title: 持有=买入（沉入成本归零）
  type: framework
  source_chapter: 第五章 第5节
  source_quote: |
    "无论什么时候卖都不要和买的成本联系起来。该卖的理由可能有很多，
    唯一不该用的理由就是'我已经赚钱了'。"
  summary: |
    持有一只股票的逻辑应该与当初买入的逻辑完全一致——基于未来现金流判断。
    每天都应当以"如果我今天有这么多现金，是否愿意按当前价格买入"来审视
    持仓。买入成本、历史涨幅、浮盈浮亏都不应影响决策。卖出唯一不该用的
    理由是"我已经赚钱了"，买入唯一不该用的理由是"它曾经到过什么价位"。
    沉入成本归零，每次决策都是独立的。
  tags: [decision, sunk-cost, holding-logic, independence]

- id: f14
  title: 先商业模式后企业文化（分析顺序框架）
  type: framework
  source_chapter: 第三章 第2节
  source_quote: |
    "我的过滤器里有商业模式和企业文化两项，过不去的我就大概看不到了。"
  summary: |
    分析一家公司时，先看商业模式是否具有持久竞争优势（好生意），
    再看企业文化是否支持长期维持该优势（好人）。
    商业模式决定天花板，企业文化决定能否持续到达天花板。
    两者都过关才值得深入研究价格。
    段永平的"过滤器"就是这两道筛：先过商业模式，再过企业文化，最后看价格。
    "我的过滤器里有商业模式和企业文化两项，过不去的我就大概看不到了。"
    过滤器的顺序不能颠倒——没有好商业模式的好文化公司也未必是好投资。
  tags: [analysis, sequence, filter, business-model, culture]

- id: f15
  title: 集中投资框架
  type: framework
  source_chapter: 第三章 第4节
  source_quote: |
    "我其实从来不认为分散投资是好事，巴菲特还管分散投资叫'对无知
    的保护'呢。"
  summary: |
    在能力圈内集中投资优于分散投资。分散化是对不了解的标的的保护——
    如果需要分散，说明对每个标的都不够了解。集中投资的逻辑：1）真正懂
    的公司很少，应该重仓；2）好机会稀缺，应集中下注；3）了解越深，风险
    越小，仓位可以越大。"一般来讲，没大把握的时候我会选择少投或者不投，
    有大把握的时候我会选择多投。"
  tags: [portfolio, concentration, circle-of-competence, allocation]
